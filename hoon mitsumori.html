<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保温工事 見積もりツール</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f5f2ed;
  color: #1a1a1a;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  min-height: 100vh;
  padding: 16px;
  max-width: 480px;
  margin: 0 auto;
}

.header {
  padding: 20px 0 16px;
  border-bottom: 2px solid #1a1a1a;
  margin-bottom: 20px;
}

.header .eyebrow {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #888;
  margin-bottom: 4px;
}

.header h1 {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: -0.02em;
}

.header h1 span {
  color: #d45a00;
}

/* Section */
.section {
  background: #fff;
  border: 1px solid #e0dbd4;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 12px;
}

.section-title {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #888;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid #f0ebe4;
}

/* Unit price settings */
.unit-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.unit-item label {
  display: block;
  font-size: 11px;
  color: #666;
  margin-bottom: 4px;
}

.unit-item input {
  width: 100%;
  background: #f9f7f4;
  border: 1px solid #e0dbd4;
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 13px;
  color: #1a1a1a;
  outline: none;
}

.unit-item input:focus {
  border-color: #d45a00;
}

/* Input table */
.pipe-table {
  width: 100%;
  border-collapse: collapse;
}

.pipe-table th {
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #888;
  text-align: left;
  padding: 0 0 8px;
  font-weight: 600;
}

.pipe-table th:not(:first-child) {
  text-align: right;
}

.pipe-table tr:not(:last-child) td {
  padding-bottom: 8px;
}

.pipe-table td {
  vertical-align: middle;
}

.pipe-label {
  font-size: 13px;
  font-weight: 700;
  color: #1a1a1a;
  width: 50px;
}

.pipe-table input[type="number"] {
  width: 100%;
  background: #f9f7f4;
  border: 1px solid #e0dbd4;
  border-radius: 6px;
  padding: 7px 8px;
  font-size: 13px;
  color: #1a1a1a;
  text-align: right;
  outline: none;
}

.pipe-table input[type="number"]:focus {
  border-color: #d45a00;
}

.pipe-table td:not(:first-child) {
  padding-left: 6px;
}

/* Duct */
.duct-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.duct-row label {
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;
}

.duct-row input {
  flex: 1;
  background: #f9f7f4;
  border: 1px solid #e0dbd4;
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 13px;
  text-align: right;
  outline: none;
}

.duct-row input:focus {
  border-color: #d45a00;
}

.duct-row span {
  font-size: 12px;
  color: #888;
  white-space: nowrap;
}

/* Result */
.result-section {
  background: #1a1a1a;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 12px;
}

.result-section .r-title {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #666;
  margin-bottom: 12px;
}

.result-rows {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 14px;
}

.result-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.result-row .r-label {
  font-size: 12px;
  color: #888;
}

.result-row .r-value {
  font-size: 14px;
  font-weight: 700;
  color: #f5f2ed;
}

.result-total {
  border-top: 1px solid #333;
  padding-top: 12px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.result-total .t-label {
  font-size: 12px;
  color: #888;
  letter-spacing: 0.05em;
}

.result-total .t-value {
  font-size: 28px;
  font-weight: 900;
  color: #d45a00;
  letter-spacing: -0.02em;
}

.result-tax {
  text-align: right;
  font-size: 11px;
  color: #555;
  margin-top: 4px;
}

/* Buttons */
.btn-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.btn {
  flex: 1;
  padding: 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  letter-spacing: 0.03em;
}

.btn-calc {
  background: #d45a00;
  color: #fff;
}

.btn-reset {
  background: #e0dbd4;
  color: #666;
}

/* Breakdown */
.breakdown {
  background: #fff;
  border: 1px solid #e0dbd4;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 12px;
  display: none;
}

.breakdown.show { display: block; }

.breakdown-title {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #888;
  margin-bottom: 10px;
}

.breakdown-item {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #555;
  padding: 4px 0;
  border-bottom: 1px solid #f0ebe4;
}

.breakdown-item:last-child { border-bottom: none; }
.breakdown-item .bi-val { color: #1a1a1a; font-weight: 600; }

/* Tab */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 12px;
}

.tab {
  flex: 1;
  padding: 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-align: center;
  cursor: pointer;
  border: 1px solid #e0dbd4;
  background: #fff;
  color: #888;
  transition: all 0.15s;
}

.tab.active {
  background: #1a1a1a;
  color: #fff;
  border-color: #1a1a1a;
}
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">前川工業</div>
  <h1>保温工事<span>見積もり</span>ツール</h1>
</div>

<!-- 単価設定 -->
<div class="section">
  <div class="section-title">単価設定（円）</div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('pipe')">配管単価</div>
    <div class="tab" onclick="switchTab('fitting')">継手単価</div>
    <div class="tab" onclick="switchTab('duct')">ダクト単価</div>
  </div>

  <div id="tab-pipe" class="unit-grid">
    <div class="unit-item"><label>20A（/m）</label><input type="number" id="u20" value="800"></div>
    <div class="unit-item"><label>25A（/m）</label><input type="number" id="u25" value="900"></div>
    <div class="unit-item"><label>32A（/m）</label><input type="number" id="u32" value="1000"></div>
    <div class="unit-item"><label>40A（/m）</label><input type="number" id="u40" value="1100"></div>
    <div class="unit-item"><label>50A（/m）</label><input type="number" id="u50" value="1300"></div>
    <div class="unit-item"><label>65A（/m）</label><input type="number" id="u65" value="1500"></div>
    <div class="unit-item"><label>80A（/m）</label><input type="number" id="u80" value="1800"></div>
    <div class="unit-item"><label>100A（/m）</label><input type="number" id="u100" value="2200"></div>
  </div>

  <div id="tab-fitting" class="unit-grid" style="display:none">
    <div class="unit-item"><label>20A エルボ（/個）</label><input type="number" id="fe20" value="300"></div>
    <div class="unit-item"><label>25A エルボ（/個）</label><input type="number" id="fe25" value="350"></div>
    <div class="unit-item"><label>32A エルボ（/個）</label><input type="number" id="fe32" value="400"></div>
    <div class="unit-item"><label>40A エルボ（/個）</label><input type="number" id="fe40" value="450"></div>
    <div class="unit-item"><label>50A エルボ（/個）</label><input type="number" id="fe50" value="550"></div>
    <div class="unit-item"><label>65A エルボ（/個）</label><input type="number" id="fe65" value="650"></div>
    <div class="unit-item"><label>80A エルボ（/個）</label><input type="number" id="fe80" value="800"></div>
    <div class="unit-item"><label>100A エルボ（/個）</label><input type="number" id="fe100" value="1000"></div>
  </div>

  <div id="tab-duct" style="display:none">
    <div class="unit-item"><label>ダクト保温（/㎡）</label><input type="number" id="uDuct" value="3500" style="width:100%"></div>
  </div>
</div>

<!-- 数量入力 -->
<div class="section">
  <div class="section-title">数量入力</div>
  <table class="pipe-table">
    <thead>
      <tr>
        <th>口径</th>
        <th style="text-align:right">直管（m）</th>
        <th style="text-align:right">エルボ（個）</th>
      </tr>
    </thead>
    <tbody>
      <tr><td class="pipe-label">20A</td><td><input type="number" id="m20" value="0" min="0"></td><td><input type="number" id="e20" value="0" min="0"></td></tr>
      <tr><td class="pipe-label">25A</td><td><input type="number" id="m25" value="0" min="0"></td><td><input type="number" id="e25" value="0" min="0"></td></tr>
      <tr><td class="pipe-label">32A</td><td><input type="number" id="m32" value="0" min="0"></td><td><input type="number" id="e32" value="0" min="0"></td></tr>
      <tr><td class="pipe-label">40A</td><td><input type="number" id="m40" value="0" min="0"></td><td><input type="number" id="e40" value="0" min="0"></td></tr>
      <tr><td class="pipe-label">50A</td><td><input type="number" id="m50" value="0" min="0"></td><td><input type="number" id="e50" value="0" min="0"></td></tr>
      <tr><td class="pipe-label">65A</td><td><input type="number" id="m65" value="0" min="0"></td><td><input type="number" id="e65" value="0" min="0"></td></tr>
      <tr><td class="pipe-label">80A</td><td><input type="number" id="m80" value="0" min="0"></td><td><input type="number" id="e80" value="0" min="0"></td></tr>
      <tr><td class="pipe-label">100A</td><td><input type="number" id="m100" value="0" min="0"></td><td><input type="number" id="e100" value="0" min="0"></td></tr>
    </tbody>
  </table>

  <div style="margin-top:14px; padding-top:12px; border-top:1px solid #f0ebe4;">
    <div class="duct-row">
      <label>ダクト</label>
      <input type="number" id="ductM2" value="0" min="0">
      <span>㎡</span>
    </div>
  </div>
</div>

<!-- 諸経費 -->
<div class="section">
  <div class="section-title">諸経費・調整</div>
  <div class="unit-grid">
    <div class="unit-item">
      <label>諸経費（円）</label>
      <input type="number" id="miscCost" value="0">
    </div>
    <div class="unit-item">
      <label>値引き（円）</label>
      <input type="number" id="discount" value="0">
    </div>
  </div>
</div>

<!-- 計算ボタン -->
<div class="btn-row">
  <button class="btn btn-calc" onclick="calculate()">見積もり計算</button>
  <button class="btn btn-reset" onclick="resetAll()">リセット</button>
</div>

<!-- 結果 -->
<div class="result-section">
  <div class="r-title">見積もり結果</div>
  <div class="result-rows">
    <div class="result-row"><span class="r-label">配管工事</span><span class="r-value" id="rPipe">¥0</span></div>
    <div class="result-row"><span class="r-label">ダクト工事</span><span class="r-value" id="rDuct">¥0</span></div>
    <div class="result-row"><span class="r-label">諸経費</span><span class="r-value" id="rMisc">¥0</span></div>
    <div class="result-row"><span class="r-label">値引き</span><span class="r-value" id="rDiscount">-¥0</span></div>
  </div>
  <div class="result-total">
    <span class="t-label">合計（税抜）</span>
    <span class="t-value" id="rTotal">¥0</span>
  </div>
  <div class="result-tax" id="rTaxInfo">消費税(10%): ¥0 ／ 税込: ¥0</div>
</div>

<!-- 明細 -->
<div class="breakdown" id="breakdown">
  <div class="breakdown-title">明細内訳</div>
  <div id="breakdownItems"></div>
</div>

<script>
const sizes = [20,25,32,40,50,65,80,100];

function switchTab(tab) {
  ['pipe','fitting','duct'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? (t === 'duct' ? 'block' : 'grid') : 'none';
  });
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['pipe','fitting','duct'][i] === tab);
  });
}

function fmt(n) {
  return '¥' + Math.round(n).toLocaleString('ja-JP');
}

function calculate() {
  let pipeTotal = 0;
  let ductTotal = 0;
  const items = [];

  sizes.forEach(s => {
    const m = +document.getElementById('m' + s).value || 0;
    const e = +document.getElementById('e' + s).value || 0;
    const um = +document.getElementById('u' + s).value || 0;
    const ue = +document.getElementById('fe' + s).value || 0;

    const pipeAmt = m * um;
    const elbowAmt = e * ue;

    if (pipeAmt > 0) {
      items.push({ label: `${s}A 直管 ${m}m × ${fmt(um)}`, val: pipeAmt });
      pipeTotal += pipeAmt;
    }
    if (elbowAmt > 0) {
      items.push({ label: `${s}A エルボ ${e}個 × ${fmt(ue)}`, val: elbowAmt });
      pipeTotal += elbowAmt;
    }
  });

  const ductM2 = +document.getElementById('ductM2').value || 0;
  const uDuct = +document.getElementById('uDuct').value || 0;
  ductTotal = ductM2 * uDuct;
  if (ductTotal > 0) {
    items.push({ label: `ダクト ${ductM2}㎡ × ${fmt(uDuct)}`, val: ductTotal });
  }

  const misc = +document.getElementById('miscCost').value || 0;
  const discount = +document.getElementById('discount').value || 0;
  const subtotal = pipeTotal + ductTotal + misc - discount;
  const tax = Math.round(subtotal * 0.1);
  const taxInc = subtotal + tax;

  document.getElementById('rPipe').textContent = fmt(pipeTotal);
  document.getElementById('rDuct').textContent = fmt(ductTotal);
  document.getElementById('rMisc').textContent = fmt(misc);
  document.getElementById('rDiscount').textContent = '-' + fmt(discount);
  document.getElementById('rTotal').textContent = fmt(subtotal);
  document.getElementById('rTaxInfo').textContent = `消費税(10%): ${fmt(tax)} ／ 税込: ${fmt(taxInc)}`;

  // Breakdown
  const bd = document.getElementById('breakdown');
  const bdItems = document.getElementById('breakdownItems');
  if (items.length > 0) {
    bdItems.innerHTML = items.map(i => `
      <div class="breakdown-item">
        <span>${i.label}</span>
        <span class="bi-val">${fmt(i.val)}</span>
      </div>
    `).join('');
    bd.classList.add('show');
  } else {
    bd.classList.remove('show');
  }
}

function resetAll() {
  sizes.forEach(s => {
    document.getElementById('m' + s).value = 0;
    document.getElementById('e' + s).value = 0;
  });
  document.getElementById('ductM2').value = 0;
  document.getElementById('miscCost').value = 0;
  document.getElementById('discount').value = 0;
  document.getElementById('rPipe').textContent = '¥0';
  document.getElementById('rDuct').textContent = '¥0';
  document.getElementById('rMisc').textContent = '¥0';
  document.getElementById('rDiscount').textContent = '-¥0';
  document.getElementById('rTotal').textContent = '¥0';
  document.getElementById('rTaxInfo').textContent = '消費税(10%): ¥0 ／ 税込: ¥0';
  document.getElementById('breakdown').classList.remove('show');
}
</script>
</body>
</html>
